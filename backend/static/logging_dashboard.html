<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBD Agent — System Console</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06080f;
            --bg-secondary: #0c1021;
            --bg-card: #111631;
            --bg-card-alt: #161c3a;
            --bg-hover: #1c2347;
            --bg-input: #0d1125;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(99, 102, 241, 0.4);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #4b5578;
            --accent-blue: #6366f1;
            --accent-purple: #a78bfa;
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(167, 139, 250, 0.04));
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 900;
            color: white;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 12px;
            margin-left: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .btn-sm {
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-sm:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-sm.danger {
            border-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .btn-sm.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ─── MAIN LAYOUT ─── */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex: 1;
            overflow: hidden;
        }

        /* ─── LEFT: LOGS PANEL ─── */
        .logs-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .stat-meta {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .stat-card.backend .stat-value {
            color: var(--accent-blue);
        }

        .stat-card.database .stat-value {
            color: var(--accent-purple);
        }

        .stat-card.email .stat-value {
            color: var(--accent-amber);
        }

        .stat-card.frontend .stat-value {
            color: var(--accent-cyan);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            padding: 10px 20px 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-secondary);
        }

        .tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-blue);
        }

        .tab .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            font-size: 9px;
            font-weight: 700;
            margin-left: 6px;
            padding: 0 5px;
        }

        .tab.active .badge {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-blue);
        }

        /* Log List */
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .log-container::-webkit-scrollbar {
            width: 4px;
        }

        .log-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 2px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 100px 52px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 6px 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            transition: background 0.12s;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-entry:hover {
            background: var(--bg-hover);
        }

        .log-time {
            color: var(--text-muted);
            font-size: 10px;
        }

        .log-level {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 3px;
            text-align: center;
        }

        .log-level.info {
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent-blue);
        }

        .log-level.success {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-green);
        }

        .log-level.warn {
            background: rgba(245, 158, 11, 0.12);
            color: var(--accent-amber);
        }

        .log-level.error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
        }

        .log-level.debug {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
        }

        .log-message {
            color: var(--text-primary);
            line-height: 1.4;
            word-break: break-word;
        }

        .log-source {
            color: var(--text-muted);
            font-size: 9px;
            background: rgba(255, 255, 255, 0.03);
            padding: 1px 6px;
            border-radius: 3px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 12px;
        }

        /* ─── RIGHT: API TESTER ─── */
        .api-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .api-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .api-header h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .api-header h2 span {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 11px;
            margin-left: 6px;
        }

        .api-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .api-list::-webkit-scrollbar {
            width: 4px;
        }

        .api-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .api-list::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 2px;
        }

        .api-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .api-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .api-card.expanded {
            border-color: var(--border-active);
        }

        .api-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .api-card-header:hover {
            background: var(--bg-hover);
        }

        .method-badge {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 3px 8px;
            border-radius: 4px;
            min-width: 36px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .method-badge.get {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-green);
        }

        .method-badge.post {
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent-blue);
        }

        .api-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .api-desc {
            font-size: 9px;
            color: var(--text-muted);
        }

        .api-card-body {
            display: none;
            padding: 0 12px 12px;
            border-top: 1px solid var(--border);
        }

        .api-card.expanded .api-card-body {
            display: block;
            padding-top: 10px;
        }

        .api-card-body textarea {
            width: 100%;
            min-height: 60px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 8px 10px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-card-body textarea:focus {
            border-color: var(--border-active);
        }

        .api-card-body label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
            display: block;
        }

        .api-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-execute {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-execute:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-execute:active {
            transform: scale(0.96);
        }

        .btn-execute.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .api-result {
            margin-top: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent-green);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
            display: none;
        }

        .api-result.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .api-result.error {
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .api-result::-webkit-scrollbar {
            width: 4px;
        }

        .api-result::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 2px;
        }

        .api-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-size: 10px;
            font-weight: 600;
        }

        .api-status.ok {
            color: var(--accent-green);
        }

        .api-status.fail {
            color: var(--accent-red);
        }

        .api-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .api-status.ok .dot {
            background: var(--accent-green);
        }

        .api-status.fail .dot {
            background: var(--accent-red);
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: var(--bg-hover);
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--accent-red);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-body pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--accent-green);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .modal-body pre.error {
            color: var(--accent-red);
        }

        .modal-footer {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            text-align: right;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="logo">O</div>
            <h1>System Console <span>Outsmart OBD Agent</span></h1>
        </div>
        <div class="header-right">
            <div class="live-indicator">
                <div class="live-dot"></div>LIVE
            </div>
            <button class="btn-sm danger" onclick="clearLogs()">Clear Logs</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- LEFT: LOGS -->
        <div class="logs-panel">
            <div class="stats-bar">
                <div class="stat-card backend"
                    onclick="switchTab(document.querySelector('[data-category=backend]'),'backend')">
                    <div class="stat-label">Backend</div>
                    <div class="stat-value" id="stat-backend-total">0</div>
                    <div class="stat-meta" id="stat-backend-meta">—</div>
                </div>
                <div class="stat-card database"
                    onclick="switchTab(document.querySelector('[data-category=database]'),'database')">
                    <div class="stat-label">Database</div>
                    <div class="stat-value" id="stat-database-total">0</div>
                    <div class="stat-meta" id="stat-database-meta">—</div>
                </div>
                <div class="stat-card email"
                    onclick="switchTab(document.querySelector('[data-category=email]'),'email')">
                    <div class="stat-label">Email</div>
                    <div class="stat-value" id="stat-email-total">0</div>
                    <div class="stat-meta" id="stat-email-meta">—</div>
                </div>
                <div class="stat-card frontend"
                    onclick="switchTab(document.querySelector('[data-category=frontend]'),'frontend')">
                    <div class="stat-label">Frontend</div>
                    <div class="stat-value" id="stat-frontend-total">0</div>
                    <div class="stat-meta" id="stat-frontend-meta">—</div>
                </div>
            </div>
            <div class="tabs">
                <button class="tab active" data-category="" onclick="switchTab(this,'')">All <span class="badge"
                        id="badge-all">0</span></button>
                <button class="tab" data-category="backend" onclick="switchTab(this,'backend')">⚙️ Backend <span
                        class="badge" id="badge-backend">0</span></button>
                <button class="tab" data-category="database" onclick="switchTab(this,'database')">🗄️ Database <span
                        class="badge" id="badge-database">0</span></button>
                <button class="tab" data-category="email" onclick="switchTab(this,'email')">📧 Email <span class="badge"
                        id="badge-email">0</span></button>
                <button class="tab" data-category="frontend" onclick="switchTab(this,'frontend')">🖥️ Frontend <span
                        class="badge" id="badge-frontend">0</span></button>
            </div>
            <div class="log-container" id="logContainer">
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>Waiting for logs...</p>
                </div>
            </div>
        </div>

        <!-- RIGHT: API TESTER -->
        <div class="api-panel">
            <div class="api-header">
                <h2>🔌 API Tester <span>Hit & Test</span></h2>
                <button class="btn-sm" onclick="collapseAll()">Collapse All</button>
            </div>
            <div class="api-list" id="apiList"></div>
        </div>
    </div>

    <!-- RESPONSE MODAL -->
    <div class="modal-overlay" id="responseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">API Response</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="modalResult"></pre>
            </div>
            <div class="modal-footer">
                <button class="btn-sm" onclick="closeModal()">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let currentCategory = '';

        // ─── API ENDPOINTS REGISTRY ───
        const endpoints = [
            { method: 'GET', path: '/', desc: 'Root — API status & DB info', body: null },
            { method: 'GET', path: '/health-check', desc: 'System health & DB connectivity', body: null },
            { method: 'GET', path: '/db-stats', desc: 'Database table counts', body: null },
            { method: 'GET', path: '/scrub-history', desc: 'Last 50 scrub history entries', body: null },
            { method: 'GET', path: '/fetch-request', desc: 'Fetch latest OBD email request', body: null },
            { method: 'GET', path: '/verify-email', desc: 'Send test verification email', body: null },
            { method: 'GET', path: '/logs', desc: 'Fetch system logs', body: null },
            {
                method: 'POST', path: '/login', desc: 'Authenticate admin user',
                body: JSON.stringify({ username: "admin", password: "admin123" }, null, 2)
            },
            {
                method: 'POST', path: '/create-user', desc: 'Create new admin user',
                body: JSON.stringify({ username: "newuser", password: "pass123" }, null, 2)
            },
            {
                method: 'POST', path: '/scrub', desc: 'Run MSISDN scrubbing pipeline',
                body: JSON.stringify({ msisdn_list: ["2348001234567", "2348009876543"], operator: "MTN", options: { check_dnd: true, check_sub: true } }, null, 2)
            },
            {
                method: 'POST', path: '/launch-campaign', desc: 'Save MSISDNs to campaign table',
                body: JSON.stringify({ msisdn_list: ["8001234567"], project_name: "test_campaign" }, null, 2)
            },
            {
                method: 'POST', path: '/schedule-promotion', desc: 'Save scheduling details',
                body: JSON.stringify({ obd_name: "Test_Promo", flow_name: "Promo Flow 1", msc_ip: "10.200.1.1", cli: "556677" }, null, 2)
            },
            { method: 'POST', path: '/trigger-email-sync', desc: 'Start email CSV sync agent (10 min poll)', body: null },
            {
                method: 'POST', path: '/log-scrub-entry', desc: 'Log a scrub history entry',
                body: JSON.stringify({ total_input: 100, final_count: 90, dnd_removed: 5, sub_removed: 3, unsub_removed: 2, operator_removed: 0, msisdn_list: [] }, null, 2)
            },
            {
                method: 'POST', path: '/generate-content', desc: 'Generate AI content via Gemini',
                body: JSON.stringify({ prompt: "Write a short OBD greeting script" }, null, 2)
            },
            { method: 'POST', path: '/logs/clear', desc: 'Clear all system logs', body: null },
        ];

        // ─── RENDER API CARDS ───
        function renderApiCards() {
            const container = document.getElementById('apiList');
            container.innerHTML = endpoints.map((ep, i) => `
                <div class="api-card" id="api-card-${i}">
                    <div class="api-card-header" onclick="toggleCard(${i})">
                        <span class="method-badge ${ep.method.toLowerCase()}">${ep.method}</span>
                        <span class="api-path">${ep.path}</span>
                    </div>
                    <div class="api-card-body">
                        <div class="api-desc" style="margin-bottom:8px">${ep.desc}</div>
                        ${ep.body !== null ? `
                            <label>Request Body (JSON)</label>
                            <textarea id="api-body-${i}">${ep.body}</textarea>
                        ` : ''}
                        <div class="api-actions">
                            <button class="btn-execute" id="api-btn-${i}" onclick="executeApi(${i})">
                                ▶ Execute
                            </button>
                        </div>
                        <div class="api-status" id="api-status-${i}"></div>
                        <div class="api-result" id="api-result-${i}"></div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCard(i) {
            const card = document.getElementById(`api-card-${i}`);
            card.classList.toggle('expanded');
        }

        function collapseAll() {
            document.querySelectorAll('.api-card').forEach(c => c.classList.remove('expanded'));
        }

        async function executeApi(i) {
            const ep = endpoints[i];
            const btn = document.getElementById(`api-btn-${i}`);
            const resultEl = document.getElementById(`api-result-${i}`);
            const statusEl = document.getElementById(`api-status-${i}`);

            btn.classList.add('loading');
            btn.textContent = '⏳ Running...';
            resultEl.className = 'api-result';
            resultEl.style.display = 'none';
            statusEl.innerHTML = '';

            const startTime = performance.now();

            try {
                const options = { method: ep.method };
                if (ep.method === 'POST' && ep.body !== null) {
                    const bodyEl = document.getElementById(`api-body-${i}`);
                    options.headers = { 'Content-Type': 'application/json' };
                    options.body = bodyEl ? bodyEl.value : '';
                } else if (ep.method === 'POST') {
                    options.headers = { 'Content-Type': 'application/json' };
                }

                const res = await fetch(API + ep.path, options);
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                const data = await res.json();

                const responseText = JSON.stringify(data, null, 2);

                // Show in inline preview
                resultEl.textContent = responseText;
                resultEl.className = `api-result visible ${res.ok ? '' : 'error'}`;

                statusEl.innerHTML = `
                    <span class="api-status ${res.ok ? 'ok' : 'fail'}">
                        <span class="dot"></span>
                        ${res.status} ${res.statusText} · ${elapsed}s
                    </span>`;

                // OPEN POP-UP WINDOW
                showModal(ep.path, responseText, !res.ok);

            } catch (err) {
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                const errorText = `Network Error: ${err.message}`;
                resultEl.textContent = errorText;
                resultEl.className = 'api-result visible error';
                statusEl.innerHTML = `<span class="api-status fail"><span class="dot"></span>FAILED · ${elapsed}s</span>`;

                showModal(ep.path, errorText, true);
            } finally {
                btn.classList.remove('loading');
                btn.textContent = '▶ Execute';
            }
        }

        function showModal(path, result, isError) {
            const modal = document.getElementById('responseModal');
            const title = document.getElementById('modalTitle');
            const resultPre = document.getElementById('modalResult');

            title.textContent = `Response: ${path}`;
            resultPre.textContent = result;
            resultPre.className = isError ? 'error' : '';

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('responseModal').style.display = 'none';
        }

        // Close modal on escape key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on clicking overlay
        document.getElementById('responseModal').addEventListener('click', (e) => {
            if (e.target.id === 'responseModal') closeModal();
        });

        // ─── LOGS FUNCTIONS ───
        function formatTime(isoString) {
            const d = new Date(isoString);
            return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })
                + '.' + String(d.getMilliseconds()).padStart(3, '0');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderLogs(logs) {
            const container = document.getElementById('logContainer');
            if (logs.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No logs${currentCategory ? ' for ' + currentCategory : ''}</p></div>`;
                return;
            }
            container.innerHTML = logs.map(l => `
                <div class="log-entry">
                    <span class="log-time">${formatTime(l.timestamp)}</span>
                    <span class="log-level ${l.level}">${l.level}</span>
                    <span class="log-message">${escapeHtml(l.message)}</span>
                    ${l.source ? `<span class="log-source">${l.source}</span>` : ''}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function updateStats(stats) {
            let allTotal = 0;
            for (const [cat, data] of Object.entries(stats)) {
                const totalEl = document.getElementById(`stat-${cat}-total`);
                const metaEl = document.getElementById(`stat-${cat}-meta`);
                const badgeEl = document.getElementById(`badge-${cat}`);
                if (totalEl) totalEl.textContent = data.total;
                allTotal += data.total;
                if (metaEl) {
                    let meta = '';
                    if (data.errors > 0) meta += `${data.errors} err`;
                    if (data.warnings > 0) meta += `${meta ? ' · ' : ''}${data.warnings} warn`;
                    if (!meta && data.last_activity) meta = formatTime(data.last_activity);
                    metaEl.textContent = meta || '—';
                }
                if (badgeEl) badgeEl.textContent = data.total;
            }
            const allBadge = document.getElementById('badge-all');
            if (allBadge) allBadge.textContent = allTotal;
        }

        async function fetchLogs() {
            try {
                const url = `${API}/logs?since_id=0${currentCategory ? '&category=' + currentCategory : ''}`;
                const res = await fetch(url);
                const data = await res.json();
                renderLogs(data.logs);
                updateStats(data.stats);
            } catch (err) { /* silent */ }
        }

        function switchTab(el, category) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentCategory = category;
            fetchLogs();
        }

        async function clearLogs() {
            await fetch(`${API}/logs/clear`, { method: 'POST' });
            fetchLogs();
        }

        // ─── INIT ───
        renderApiCards();
        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>

</html>
